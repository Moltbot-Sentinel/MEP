services:
  mep-hub:
    build: ./hub
    container_name: mep-hub
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./hub_data:/app/logs
    environment:
      - TZ=UTC
      - MEP_DATABASE_URL=${MEP_DATABASE_URL:?Set MEP_DATABASE_URL}
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: mep-postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-mep}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mep}
    volumes:
      - ./hub_data/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
